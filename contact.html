<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ewout Lowie - journalist, redacteur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;1,400;1,700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000;
      --white: #e8e4dc;
      --muted: #888;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--white);
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      line-height: 1.7;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent);
      backdrop-filter: blur(4px);
    }

    nav .logo {
      font-family: 'Bangers', cursive;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      color: var(--white);
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    nav ul a {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav ul a:hover { color: var(--white); }

    /* ── BACK BUTTON ── */
    .back-btn {
      display: inline-block;
      margin: 80px 2rem 0;
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
    }

    .back-btn:hover { text-decoration: underline; }

    /* ── CONTENT ── */
    .contact-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 2rem 4rem;
    }

    .section-label {
      font-family: 'Bangers', cursive;
      font-size: clamp(1.1rem, 1.6vw, 1.5rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 1rem;
      line-height: 1;
    }

    .contact-wrap p {
      color: #a0998f;
      font-size: 0.97rem;
      line-height: 1.6;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 3rem 2rem;
      text-align: center;
    }

    footer p {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    @media (max-width: 680px) {
      nav ul { display: none; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="logo">Ewout Lowie</a>
    <ul>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <a href="index.html" class="back-btn">&lt; Terug</a>

  <div class="contact-wrap" style="padding-top: 120px;">
    <div class="section-label">Contact</div>
    <p>Mij iets vragen of vertellen kan je doen door te e-mailen naar ewoutlowie@gmail.com</p>
    <ul style="list-style:none; padding:0; margin-top:1rem; display:flex; flex-direction:column; gap:0.4rem;">
      <li style="font-size:0.97rem;"><span style="color:rgba(255,255,255,0.2);">▸ </span><a href="https://www.linkedin.com/in/ewout-lowie-975904174/" target="_blank" style="color:#a0998f; text-decoration:underline;">LinkedIn</a></li>
      <li style="font-size:0.97rem;"><span style="color:rgba(255,255,255,0.2);">▸ </span><a href="https://ewoutlowie.substack.com/" target="_blank" style="color:#a0998f; text-decoration:underline;">Substack</a></li>
    </ul>
  </div>

  <footer>
    <p>© 2025 Ewout Lowie</p>
  </footer>

</body>
</html>
